name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without a leading v, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "version must be semver like 0.1.0, got: $VERSION" >&2
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag already exists: $TAG" >&2
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          make test
          make bench

      - name: Build release artifacts
        run: |
          mkdir -p dist build
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64
          do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            NAME="tpc_${VERSION}_${GOOS}_${GOARCH}"
            OUT="build/$NAME"
            mkdir -p "$OUT"
            BIN="tpc"
            if [ "$GOOS" = "windows" ]; then
              BIN="tpc.exe"
            fi
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags='-s -w' -o "$OUT/$BIN" ./cmd/tpc
            cp README.md LICENSE "$OUT/"
            if [ "$GOOS" = "windows" ]; then
              (cd build && zip -qr "../dist/$NAME.zip" "$NAME")
            else
              tar -C build -czf "dist/$NAME.tar.gz" "$NAME"
            fi
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" dist/* \
            --title "tfplanctx $TAG" \
            --generate-notes
