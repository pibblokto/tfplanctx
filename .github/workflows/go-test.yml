name: go-test

on:
  push:
    branches:
    - main
    - feature/**
    - bugfix/**
    - chore/**
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go test ./...
